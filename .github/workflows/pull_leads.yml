name: Pull IndiaMART Leads

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  pull-leads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Create credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > imartcredential.json

      - name: Run pull leads
        run: python pull_leads.py